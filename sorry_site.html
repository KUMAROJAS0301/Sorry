<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorry 💔</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      padding: 15px;
      overflow: hidden;
    }

    .card {
      background: rgba(0,0,0,0.25);
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 350px;
      position: relative;
    }

    .glow {
      color: #fff;
      text-shadow: 0 0 5px #fff,
                   0 0 10px #ff4d6d,
                   0 0 20px #ff4d6d,
                   0 0 30px #ff4d6d;
      font-size: 22px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      background: white;
      margin-left: 5px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }

    p {
      font-size: 15px;
      line-height: 1.5;
      margin-top: 10px;
    }

    .buttons {
      margin-top: 20px;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 25px;
      margin: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    #yesBtn {
      background: white;
      color: #ff4d6d;
    }

    #noBtn {
      background: black;
      color: white;
      position: absolute;
    }

    #message {
      margin-top: 15px;
      display: none;
      font-size: 16px;
    }
  </style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card" id="card">

  <h1 class="glow">
    <span id="typing"></span><span class="cursor"></span>
  </h1>

  <p>
    Sorry bhennu maaf kr de… sorry 😔  
    Aur maaf nahi ki toh kya, itni aasani se bachne wali nahi hai tu 😏❤️
  </p>

  <div class="buttons">
    <button id="yesBtn" onclick="forgive()">Theek hai 😌</button>
    <button id="noBtn" ontouchstart="moveButton()" onmouseover="moveButton()">Nahi 😏</button>
  </div>

  <div id="message">
    Hehe 😝 pata tha tu maan jayegi ❤️  
    Thank youuu 🥺
  </div>

</div>

<script>
document.body.addEventListener('click', function () {
  document.getElementById("bgMusic").play();
});

const text = "Sorry, sidd bhennnuuuuu 💔";
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 80);
  }
}
typeWriter();

function createEmoji() {
  const emoji = document.createElement("div");
  emoji.innerHTML = ["❤️","💔","🥺","💖","✨"][Math.floor(Math.random()*5)];

  emoji.style.position = "fixed";
  emoji.style.left = Math.random() * window.innerWidth + "px";
  emoji.style.top = "-20px";
  emoji.style.fontSize = (20 + Math.random()*20) + "px";
  emoji.style.pointerEvents = "none";

  document.body.appendChild(emoji);

  let fall = setInterval(() => {
    emoji.style.top = (emoji.offsetTop + 4) + "px";
  }, 20);

  setTimeout(() => {
    clearInterval(fall);
    emoji.remove();
  }, 4000);
}
setInterval(createEmoji, 400);

function moveButton() {
  let btn = document.getElementById("noBtn");
  let card = document.getElementById("card");

  let maxX = card.clientWidth - btn.offsetWidth;
  let maxY = card.clientHeight - btn.offsetHeight;

  let x = Math.random() * maxX;
  let y = Math.random() * maxY;

  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

function forgive() {
  document.getElementById("message").style.display = "block";
}
</script>

</body>
</html>
